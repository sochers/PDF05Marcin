<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Monte Carlo Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --secondary: #95a5a6; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        h2 { margin-top: 0; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        /* Form controls */
        .controls { display: flex; gap: 20px; margin-bottom: 15px; align-items: center; background: #fff; padding: 15px; border-radius: 8px; }
        select, input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        
        /* Table styles */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fdfdfd; }
        .creep-input { width: 45px; padding: 3px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
        .creep-input:focus { border-color: var(--primary); outline: none; }

        .summary-table td { font-weight: bold; color: #2c3e50; }
        .highlight { color: var(--primary); }

        .chart-container { height: 300px; width: 100%; position: relative; }
        .full-width { grid-column: 1 / -1; }
        
        #update-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #update-btn:hover { background: #27ae60; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <div class="controls card">
        <strong>Konfiguracja:</strong>
        <label>Focus zespołu: 
            <select id="focus-select">
                <option value="0.5">50%</option>
                <option value="0.75" selected>75%</option>
                <option value="1.0">100%</option>
            </select>
        </label>
        <button id="update-btn">PRZELICZ SYMULACJĘ</button>
        <span style="font-size: 0.8rem; color: #7f8c8d;">(10,000 iteracji przy każdej zmianie)</span>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Burndown & Forecast</h2>
            <div class="chart-container">
                <canvas id="burndownChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Prognoza Ukończenia (Percentyle)</h2>
            <table class="summary-table">
                <thead><tr><th>Ufność</th><th>Data</th></tr></thead>
                <tbody id="percentile-body">
                    </tbody>
            </table>
            <p style="font-size: 0.75rem; color: #666; margin-top: 15px;">
                Analiza uwzględnia historyczny throughput oraz 120% boostu we wrześniu.
            </p>
        </div>

        <div class="card full-width">
            <h2>Scope Creep & Przyrosty (Tydzień po tygodniu)</h2>
            <div style="overflow-x: auto;">
                <table id="creep-table">
                    <thead>
                        <tr id="creep-header"><th>Tydzień</th></tr>
                        <tr id="creep-inputs"><td>Dodatkowe zadania</td></tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>
