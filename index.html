<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Time Scatterplot — 2024/25</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --s-color: #3fb950;
    --m-color: #d29922;
    --l-color: #f85149;
    --p50: rgba(88,166,255,0.5);
    --p65: rgba(63,185,80,0.5);
    --p85: rgba(210,153,34,0.5);
    --p95: rgba(248,81,73,0.5);
    --grid: rgba(48,54,61,0.6);
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .dashboard {
    width: 100%;
    max-width: 1100px;
  }

  header {
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }
  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .toggle-group {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .toggle-group button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .toggle-group button.active {
    background: var(--border);
    color: var(--text);
  }
  .toggle-group button:hover:not(.active) {
    color: var(--text);
  }
  .dot-indicator {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  .percentile-toggles {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }
  .percentile-toggles button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .percentile-toggles button.active {
    color: var(--text);
  }
  .percentile-toggles button.active::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    border-radius: 1px;
  }
  .percentile-toggles button[data-p="50"].active::after { background: #58a6ff; }
  .percentile-toggles button[data-p="65"].active::after { background: #3fb950; }
  .percentile-toggles button[data-p="85"].active::after { background: #d29922; }
  .percentile-toggles button[data-p="95"].active::after { background: #f85149; }

  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    margin-bottom: 1.5rem;
  }

  canvas {
    width: 100%;
    display: block;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    font-size: 0.78rem;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-date { color: var(--text-dim); font-size: 0.72rem; }
  .tooltip .tt-value { font-weight: 700; font-family: var(--mono); font-size: 1rem; }
  .tooltip .tt-size { font-weight: 500; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
  }
  .stat-card .value {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 600;
  }
  .stat-card .sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 0.15rem;
  }

  .legend-strip {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.75rem;
  }
  .legend-strip span {
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
</style>
</head>
<body>
<div class="dashboard">
  <header>
    <h1>Lead Time Scatterplot</h1>
    <p>Dane realizacji zadań 2024–2025 &middot; 36 elementów</p>
  </header>

  <div class="stats-row" id="stats"></div>

  <div class="controls">
    <div class="toggle-group" id="sizeToggles">
      <button class="active" data-size="all">Wszystkie</button>
      <button data-size="S"><span class="dot-indicator" style="background:var(--s-color)"></span>S</button>
      <button data-size="M"><span class="dot-indicator" style="background:var(--m-color)"></span>M</button>
      <button data-size="L"><span class="dot-indicator" style="background:var(--l-color)"></span>L</button>
    </div>
    <div class="percentile-toggles" id="pctToggles">
      <button data-p="50">P50</button>
      <button data-p="65">P65</button>
      <button data-p="85">P85</button>
      <button data-p="95">P95</button>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="legend-strip">
    <span><span class="dot-indicator" style="background:var(--s-color)"></span> S — Small</span>
    <span><span class="dot-indicator" style="background:var(--m-color)"></span> M — Medium</span>
    <span><span class="dot-indicator" style="background:var(--l-color)"></span> L — Large</span>
  </div>
</div>

<script>
const DATA = [{"date":"2024-07-15","size":"S","leadTime":49},{"date":"2024-08-22","size":"S","leadTime":48},{"date":"2024-09-10","size":"S","leadTime":87},{"date":"2024-09-25","size":"M","leadTime":57},{"date":"2024-10-05","size":"M","leadTime":148},{"date":"2024-10-14","size":"S","leadTime":53},{"date":"2024-10-28","size":"S","leadTime":45},{"date":"2024-11-18","size":"M","leadTime":145},{"date":"2024-12-04","size":"L","leadTime":105},{"date":"2025-01-08","size":"S","leadTime":5},{"date":"2025-01-20","size":"L","leadTime":163},{"date":"2025-02-14","size":"S","leadTime":43},{"date":"2025-02-26","size":"M","leadTime":415},{"date":"2025-03-15","size":"L","leadTime":123},{"date":"2025-04-10","size":"M","leadTime":103},{"date":"2025-05-05","size":"L","leadTime":104},{"date":"2025-06-12","size":"L","leadTime":302},{"date":"2025-06-25","size":"L","leadTime":158},{"date":"2025-07-02","size":"L","leadTime":98},{"date":"2025-07-11","size":"S","leadTime":52},{"date":"2025-07-18","size":"M","leadTime":95},{"date":"2025-07-29","size":"S","leadTime":70},{"date":"2025-08-03","size":"M","leadTime":95},{"date":"2025-08-14","size":"M","leadTime":101},{"date":"2025-08-21","size":"M","leadTime":57},{"date":"2025-08-29","size":"M","leadTime":57},{"date":"2025-09-08","size":"S","leadTime":53},{"date":"2025-09-22","size":"L","leadTime":137},{"date":"2025-10-04","size":"S","leadTime":73},{"date":"2025-10-12","size":"M","leadTime":60},{"date":"2025-10-19","size":"S","leadTime":126},{"date":"2025-10-27","size":"M","leadTime":57},{"date":"2025-11-05","size":"L","leadTime":124},{"date":"2025-11-15","size":"M","leadTime":75},{"date":"2025-11-25","size":"M","leadTime":89},{"date":"2025-12-10","size":"S","leadTime":44}];

const COLORS = { S: '#3fb950', M: '#d29922', L: '#f85149' };
const PCT_COLORS = { 50: '#58a6ff', 65: '#3fb950', 85: '#d29922', 95: '#f85149' };
const MONTHS_PL = ['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'];

let activeSize = 'all';
let activePcts = new Set();

function percentile(arr, p) {
  const s = [...arr].sort((a, b) => a - b);
  const i = (p / 100) * (s.length - 1);
  const lo = Math.floor(i), hi = Math.ceil(i);
  return lo === hi ? s[lo] : s[lo] + (s[hi] - s[lo]) * (i - lo);
}

function getFiltered() {
  return activeSize === 'all' ? DATA : DATA.filter(d => d.size === activeSize);
}

function renderStats() {
  const f = getFiltered();
  const vals = f.map(d => d.leadTime);
  const avg = (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(0);
  const med = percentile(vals, 50).toFixed(0);
  const mn = Math.min(...vals);
  const mx = Math.max(...vals);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Liczba zadań</div><div class="value">${f.length}</div><div class="sub">${activeSize === 'all' ? 'S+M+L' : 'Rozmiar ' + activeSize}</div></div>
    <div class="stat-card"><div class="label">Średnia</div><div class="value">${avg} dni</div></div>
    <div class="stat-card"><div class="label">Mediana</div><div class="value">${med} dni</div></div>
    <div class="stat-card"><div class="label">Zakres</div><div class="value">${mn}–${mx}</div><div class="sub">min–max dni</div></div>
  `;
}

// Chart
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const DPR = window.devicePixelRatio || 1;

const PAD = { top: 30, right: 30, bottom: 50, left: 60 };
let W, H, plotW, plotH;
let points = [];

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width - 3 * 16; // padding
  H = Math.min(460, W * 0.52);
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  plotW = W - PAD.left - PAD.right;
  plotH = H - PAD.top - PAD.bottom;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const filtered = getFiltered();
  const allTimes = DATA.map(d => new Date(d.date).getTime());
  const minT = Math.min(...allTimes);
  const maxT = Math.max(...allTimes);
  const maxLT = Math.max(...DATA.map(d => d.leadTime)) * 1.08;

  const xScale = t => PAD.left + ((t - minT) / (maxT - minT)) * plotW;
  const yScale = v => PAD.top + plotH - (v / maxLT) * plotH;

  // Grid
  ctx.strokeStyle = 'rgba(48,54,61,0.5)';
  ctx.lineWidth = 0.5;
  const yTicks = 5;
  for (let i = 0; i <= yTicks; i++) {
    const v = (maxLT / yTicks) * i;
    const y = yScale(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e';
    ctx.font = '11px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(v), PAD.left - 10, y + 4);
  }

  // Y axis label
  ctx.save();
  ctx.translate(14, PAD.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px "DM Sans", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Czas realizacji (dni)', 0, 0);
  ctx.restore();

  // X axis months
  const startDate = new Date(minT);
  const endDate = new Date(maxT);
  let d = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  ctx.fillStyle = '#8b949e';
  ctx.font = '11px "DM Sans", sans-serif';
  ctx.textAlign = 'center';
  while (d <= endDate) {
    const x = xScale(d.getTime());
    if (x >= PAD.left && x <= W - PAD.right) {
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(48,54,61,0.3)';
      ctx.moveTo(x, PAD.top); ctx.lineTo(x, PAD.top + plotH); ctx.stroke();
      const label = MONTHS_PL[d.getMonth()] + (d.getMonth() === 0 ? '\n' + d.getFullYear() : '');
      ctx.fillText(label, x, H - PAD.bottom + 18);
      if (d.getMonth() === 0) {
        ctx.fillText(d.getFullYear(), x, H - PAD.bottom + 32);
      }
    }
    d.setMonth(d.getMonth() + 2);
  }

  // Percentile lines
  const filteredVals = filtered.map(d => d.leadTime);
  activePcts.forEach(p => {
    const val = percentile(filteredVals, p);
    const y = yScale(val);
    ctx.strokeStyle = PCT_COLORS[p];
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.setLineDash([]);

    // Label
    ctx.fillStyle = PCT_COLORS[p];
    ctx.font = '600 11px "JetBrains Mono", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`P${p}: ${val.toFixed(0)} dni`, W - PAD.right + 4, y + 4);
  });

  // Points
  points = [];
  // Draw dimmed points first (non-filtered)
  if (activeSize !== 'all') {
    DATA.filter(d => d.size !== activeSize).forEach(d => {
      const t = new Date(d.date).getTime();
      const x = xScale(t);
      const y = yScale(d.leadTime);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(48,54,61,0.5)';
      ctx.fill();
    });
  }

  // Active points
  filtered.forEach(d => {
    const t = new Date(d.date).getTime();
    const x = xScale(t);
    const y = yScale(d.leadTime);
    const color = COLORS[d.size];

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(x, y, 2, x, y, 10);
    grad.addColorStop(0, color + '40');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = color + '80';
    ctx.lineWidth = 1;
    ctx.stroke();

    points.push({ x, y, d });
  });
}

// Tooltip
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let closest = null, minDist = 20;
  points.forEach(p => {
    const dist = Math.hypot(p.x - mx, p.y - my);
    if (dist < minDist) { minDist = dist; closest = p; }
  });

  if (closest) {
    const d = closest.d;
    const dateObj = new Date(d.date);
    const dateStr = dateObj.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
    tooltip.innerHTML = `
      <div class="tt-date">${dateStr}</div>
      <div class="tt-value">${d.leadTime} dni</div>
      <div class="tt-size" style="color:${COLORS[d.size]}">Rozmiar: ${d.size}</div>
    `;
    tooltip.classList.add('visible');

    let tx = closest.x + 16;
    let ty = closest.y - 10;
    if (tx + 160 > W) tx = closest.x - 170;
    if (ty < 0) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    tooltip.classList.remove('visible');
  }
});
canvas.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

// Controls
document.getElementById('sizeToggles').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  activeSize = btn.dataset.size;
  document.querySelectorAll('#sizeToggles button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
  draw();
});

document.getElementById('pctToggles').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const p = parseInt(btn.dataset.p);
  if (activePcts.has(p)) { activePcts.delete(p); btn.classList.remove('active'); }
  else { activePcts.add(p); btn.classList.add('active'); }
  draw();
});

// Init
window.addEventListener('resize', () => { resize(); draw(); });
resize();
renderStats();
draw();
</script>
</body>
</html>
